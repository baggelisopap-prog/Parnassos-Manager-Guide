<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Parnassos Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

<style>
:root {
  --bg: #0b0f14;
  --bg-elevated: #111820;
  --card: #161d28;
  --card-hover: #1c2535;
  --card-glass: rgba(22, 29, 40, 0.75);
  --border: rgba(255,255,255,0.06);
  --border-light: rgba(255,255,255,0.1);
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --accent-soft: rgba(59,130,246,0.1);
  --accent-glow: rgba(59,130,246,0.25);
  --text: #edf0f7;
  --text-secondary: #94a3b8;
  --text-dim: #5e6e82;
  --success: #22c55e;
  --success-soft: rgba(34,197,94,0.1);
  --warning: #eab308;
  --warning-soft: rgba(234,179,8,0.1);
  --danger: #ef4444;
  --danger-soft: rgba(239,68,68,0.1);
  --purple: #8b5cf6;
  --purple-soft: rgba(139,92,246,0.1);
  --teal: #14b8a6;
  --teal-soft: rgba(20,184,166,0.1);
  --orange: #f97316;
  --orange-soft: rgba(249,115,22,0.1);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.3);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.4);
  --shadow-glow: 0 0 20px rgba(59,130,246,0.15);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Plus Jakarta Sans', -apple-system, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; height: 100dvh; -webkit-font-smoothing: antialiased; }

/* ═══════════════ PIN SCREEN ═══════════════ */
.pin-screen {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 1000; transition: opacity 0.5s ease, transform 0.5s ease;
}
.pin-screen::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 20%, rgba(59,130,246,0.08) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 80%, rgba(139,92,246,0.06) 0%, transparent 50%);
  pointer-events: none;
}
.pin-screen.hidden { opacity: 0; transform: scale(1.05); pointer-events: none; }

.pin-logo {
  width: 64px; height: 64px; border-radius: 18px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--purple) 100%);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 20px; box-shadow: 0 8px 32px rgba(59,130,246,0.3);
}
.pin-logo svg { width: 32px; height: 32px; color: #fff; }
.pin-title { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; position: relative; }
.pin-subtitle { color: var(--text-secondary); font-size: 14px; margin-bottom: 36px; position: relative; }

.pin-dots { display: flex; gap: 14px; margin-bottom: 36px; position: relative; }
.pin-dot {
  width: 14px; height: 14px; border-radius: 50%;
  border: 2px solid var(--border-light); background: transparent;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
.pin-dot.filled { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 12px rgba(59,130,246,0.5); transform: scale(1.1); }
.pin-dot.error { background: var(--danger); border-color: var(--danger); box-shadow: 0 0 12px rgba(239,68,68,0.5); }

.pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; max-width: 260px; position: relative; }
.pin-btn {
  width: 70px; height: 70px; border-radius: 50%;
  border: 1px solid var(--border-light); background: var(--card);
  color: var(--text); font-size: 22px; font-weight: 700;
  cursor: pointer; font-family: inherit;
  transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex; align-items: center; justify-content: center;
}
.pin-btn:active { transform: scale(0.9); background: var(--accent-soft); border-color: var(--accent); }
.pin-btn.backspace { font-size: 18px; color: var(--text-secondary); }

@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-12px)} 40%{transform:translateX(12px)} 60%{transform:translateX(-8px)} 80%{transform:translateX(8px)} }
.shake { animation: shake 0.4s ease-in-out; }

/* ═══════════════ APP SHELL ═══════════════ */
.app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
.app-content { flex: 1; overflow: hidden; position: relative; }
.tab-panel {
  position: absolute; inset: 0; overflow-y: auto; overflow-x: hidden;
  transition: opacity 0.25s ease; opacity: 0; pointer-events: none;
  scrollbar-width: none;
}
.tab-panel::-webkit-scrollbar { display: none; }
.tab-panel.active { opacity: 1; pointer-events: auto; }

/* ═══════════════ BOTTOM NAV ═══════════════ */
.bottom-nav {
  display: flex; border-top: 1px solid var(--border);
  background: rgba(11, 15, 20, 0.92);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  padding-bottom: env(safe-area-inset-bottom, 4px);
  position: relative; z-index: 10;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 10px 0 8px; background: none; border: none; cursor: pointer;
  color: var(--text-dim); transition: all 0.25s ease; font-family: inherit;
  position: relative;
}
.nav-btn::before {
  content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 0; height: 2px; background: var(--accent); border-radius: 0 0 2px 2px;
  transition: width 0.25s ease;
}
.nav-btn:active { background: rgba(59,130,246,0.05); }
.nav-btn.active { color: var(--accent); }
.nav-btn.active::before { width: 32px; }
.nav-btn svg { width: 22px; height: 22px; }
.nav-btn span { font-size: 10px; font-weight: 700; letter-spacing: 0.3px; }

/* ═══════════════ PAGE HEADER ═══════════════ */
.page-header { padding: 20px 20px 4px; }
.page-header h2 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
.page-header p { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

/* ═══════════════ DASHBOARD ═══════════════ */
#tab-home { overflow-y: auto; }
.dash-header {
  padding: 24px 20px 16px; position: relative;
}
.dash-header::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 180px;
  background: radial-gradient(ellipse at 30% 0%, rgba(59,130,246,0.07) 0%, transparent 60%);
  pointer-events: none;
}
.dash-greeting { font-size: 14px; color: var(--text-secondary); margin-bottom: 4px; position: relative; }
.dash-title { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; position: relative; }

/* Stats Row */
.stats-row {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 0 20px 16px;
}
.stat-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-md); padding: 12px 8px;
  display: flex; flex-direction: column; align-items: center; text-align: center; gap: 1px;
}
.stat-value { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
.stat-label { font-size: 9px; color: var(--text-secondary); font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; line-height: 1.2; }

/* Quick Actions */
.quick-actions {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  padding: 0 20px 16px;
}
.action-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 20px 16px;
  display: flex; flex-direction: column; gap: 10px;
  cursor: pointer; transition: all 0.2s ease;
  position: relative; overflow: hidden;
  color: var(--text); font-family: inherit; text-align: left;
}
.action-card:active { transform: scale(0.97); }
.action-card::after {
  content: ''; position: absolute; top: 0; right: 0;
  width: 80px; height: 80px; border-radius: 50%;
  opacity: 0.04; transform: translate(20px, -20px);
}
.action-icon {
  width: 40px; height: 40px; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
}
.action-icon svg { width: 20px; height: 20px; }
.action-label { font-size: 14px; font-weight: 700; color: var(--text); }
.action-count { font-size: 12px; color: var(--text-secondary); }

/* ═══════════════ SEARCH BAR ═══════════════ */
.search-wrap {
  padding: 0 20px 8px; position: relative;
}
.search-bar {
  width: 100%; padding: 12px 16px 12px 42px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-md); color: var(--text);
  font-size: 14px; font-family: inherit; font-weight: 500;
  outline: none; transition: all 0.2s ease;
}
.search-bar::placeholder { color: var(--text-dim); }
.search-bar:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
.search-icon {
  position: absolute; left: 34px; top: 50%; transform: translateY(-50%);
  color: var(--text-dim); pointer-events: none;
}

/* ═══════════════ FILTER CHIPS ═══════════════ */
.filters {
  display: flex; gap: 8px; overflow-x: auto;
  padding: 4px 20px 14px; scrollbar-width: none; align-items: center;
}
.filters::-webkit-scrollbar { display: none; }
.chip {
  padding: 8px 16px; border-radius: 100px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-secondary); cursor: pointer;
  font-size: 13px; font-weight: 600; white-space: nowrap;
  font-family: inherit; transition: all 0.2s ease;
}
.chip:active { transform: scale(0.95); }
.chip.active { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 4px 12px rgba(59,130,246,0.3); }

/* ═══════════════ PROPERTY CARDS ═══════════════ */
.card-group { margin-bottom: 20px; }
.card-group-title {
  font-size: 11px; font-weight: 700; color: var(--text-dim);
  margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1.5px;
  padding: 0 20px; display: flex; align-items: center; gap: 8px;
}
.card-group-title::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

.prop-card {
  margin: 0 20px 10px; background: var(--card);
  border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: 16px; cursor: pointer; transition: all 0.2s ease;
  position: relative; overflow: hidden;
}
.prop-card:active { background: var(--card-hover); transform: scale(0.985); }
.prop-card-accent {
  position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
}
.prop-card .title { font-size: 16px; font-weight: 700; letter-spacing: -0.2px; }
.prop-card .subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.prop-card .tags { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }

.tag {
  font-size: 11px; padding: 4px 10px; border-radius: 100px;
  font-weight: 600; display: inline-flex; align-items: center; gap: 4px;
  letter-spacing: 0.2px;
}
.tag-lock { background: var(--accent-soft); color: var(--accent); }
.tag-in { background: var(--success-soft); color: var(--success); }
.tag-out { background: var(--warning-soft); color: var(--warning); }
.tag-guests { background: var(--purple-soft); color: var(--purple); }

.prop-map-link {
  font-size: 11px; padding: 6px 10px; border-radius: var(--radius-sm);
  background: var(--accent-soft); color: var(--accent);
  text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
  font-weight: 600; font-family: inherit; border: none; cursor: pointer;
  transition: all 0.15s ease;
}
.prop-map-link:active { background: var(--accent); color: #fff; }

/* ═══════════════ DETAIL VIEW ═══════════════ */
.detail-view {
  position: fixed; inset: 0; background: var(--bg); z-index: 50;
  overflow-y: auto; overflow-x: hidden;
  transform: translateX(100%);
  transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
}
.detail-view::-webkit-scrollbar { display: none; }
.detail-view.open { transform: translateX(0); }

.detail-header {
  padding: 12px 16px; display: flex; align-items: center; gap: 8px;
  position: sticky; top: 0; z-index: 5;
  background: rgba(11, 15, 20, 0.9);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.back-btn {
  background: none; border: none; color: var(--text-secondary);
  cursor: pointer; padding: 6px; display: flex; flex-shrink: 0;
  border-radius: var(--radius-sm); transition: all 0.15s;
}
.back-btn:active { background: var(--card); color: var(--text); }
.detail-nav-btn {
  background: var(--card); border: 1px solid var(--border);
  color: var(--text-secondary); border-radius: var(--radius-sm);
  width: 34px; height: 34px; display: flex; align-items: center;
  justify-content: center; cursor: pointer; flex-shrink: 0;
  transition: all 0.15s; font-size: 12px;
}
.detail-nav-btn:active { background: var(--card-hover); color: var(--text); }

.title-wrapper {
  flex: 1; text-align: center; overflow: hidden;
  display: flex; flex-direction: column; align-items: center;
}
.title-wrapper #detailTitle {
  font-size: 16px; font-weight: 700; letter-spacing: -0.2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%;
}
.title-wrapper #detailSub {
  font-size: 11px; color: var(--text-secondary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%;
}

.maps-btn {
  background: var(--accent); color: #fff; border: none;
  border-radius: var(--radius-sm); padding: 8px 12px;
  font-size: 12px; font-weight: 700; text-decoration: none;
  display: flex; align-items: center; gap: 4px; font-family: inherit;
  flex-shrink: 0; transition: all 0.15s;
}
.maps-btn:active { background: var(--accent-hover); }

.detail-body { padding: 16px; }

/* Swipe animations */
@keyframes slideOutLeft { to { transform: translateX(-40px); opacity: 0; } }
@keyframes slideOutRight { to { transform: translateX(40px); opacity: 0; } }
@keyframes slideInRight { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes slideInLeft { from { transform: translateX(-40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.slide-out-next { animation: slideOutLeft 0.15s ease forwards; }
.slide-out-prev { animation: slideOutRight 0.15s ease forwards; }
.slide-in-next { animation: slideInRight 0.2s ease forwards; }
.slide-in-prev { animation: slideInLeft 0.2s ease forwards; }

/* ═══════════════ QUICK GRID (Detail) ═══════════════ */
.quick-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; margin-bottom: 14px;
}
.quick-box {
  background: var(--card); border-radius: var(--radius-md);
  padding: 12px 8px; text-align: center;
  border: 1px solid var(--border);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.quick-box .qb-icon { margin-bottom: 6px; }
.quick-box .qb-icon svg { width: 18px; height: 18px; }
.quick-box .val { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
.quick-box .lbl { font-size: 10px; color: var(--text-secondary); margin-top: 2px; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }

/* ═══════════════ INFO CARDS ═══════════════ */
.info-card {
  background: var(--card); border-radius: var(--radius-md);
  padding: 16px; margin-bottom: 14px; border: 1px solid var(--border);
}
.info-card .info-title {
  font-size: 11px; font-weight: 700; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
  color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.8px;
}
.info-card .info-title svg { width: 16px; height: 16px; flex-shrink: 0; }
.info-row { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; display: flex; justify-content: space-between; }
.info-row span { color: var(--text); font-weight: 600; }

.copy-btn {
  background: var(--accent-soft); border: none; border-radius: 100px;
  padding: 4px 10px; cursor: pointer; color: var(--accent);
  font-size: 11px; font-family: inherit; font-weight: 600;
  display: inline-flex; align-items: center; gap: 4px;
  margin-left: 6px; transition: all 0.2s;
}
.copy-btn:active { background: var(--accent); color: #fff; }
.copy-btn.copied { background: var(--success); color: #fff; }

/* ═══════════════ CONTACTS ═══════════════ */
.contacts-section { margin-bottom: 16px; }
.contacts-title-row {
  font-size: 11px; font-weight: 700; color: var(--text-secondary);
  text-transform: uppercase; letter-spacing: 0.8px;
  margin: 0 0 10px; display: flex; align-items: center; gap: 8px;
}
.contacts-title-row svg { width: 16px; height: 16px; }
.contacts-scroll {
  display: flex; gap: 10px; overflow-x: auto;
  padding-bottom: 4px; scrollbar-width: none;
}
.contacts-scroll::-webkit-scrollbar { display: none; }
.contact-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-md); padding: 14px 12px;
  min-width: 130px; text-align: center; flex-shrink: 0;
  display: flex; flex-direction: column; justify-content: space-between;
}
.contact-role {
  font-size: 10px; color: var(--text-dim); text-transform: uppercase;
  font-weight: 700; letter-spacing: 0.5px; margin-bottom: 4px;
}
.contact-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 10px; line-height: 1.2; }
.contact-call {
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: var(--accent);
  background: var(--accent-soft); padding: 8px 6px;
  border-radius: var(--radius-sm); text-decoration: none;
  width: 100%; transition: all 0.15s; gap: 4px;
}
.contact-call:active { background: var(--accent); color: #fff; }
.contact-call svg { width: 14px; height: 14px; }
.contact-unavailable {
  background: rgba(255,255,255,0.03); color: var(--text-dim);
  font-size: 12px; padding: 8px 6px; border-radius: var(--radius-sm);
  text-align: center; font-weight: 500;
}

/* ═══════════════ ACCORDION ═══════════════ */
.accordion {
  margin-bottom: 8px; background: var(--card);
  border-radius: var(--radius-md); border: 1px solid var(--border);
  overflow: hidden;
}
.accordion-header {
  width: 100%; padding: 14px 16px; background: none;
  border: none; cursor: pointer; display: flex;
  justify-content: space-between; align-items: center;
  color: var(--text); font-size: 14px; font-weight: 600;
  font-family: inherit; transition: all 0.2s ease;
  gap: 8px;
}
.accordion-header .acc-icon { display: flex; flex-shrink: 0; }
.accordion-header .acc-icon svg { width: 16px; height: 16px; color: inherit; }
.accordion-header .acc-label { flex: 1; text-align: left; }
.accordion-header.active { background: var(--accent); color: #fff; }
.accordion-header.active .acc-icon svg { color: rgba(255,255,255,0.8); }
.accordion-arrow {
  color: var(--text-dim); transition: transform 0.25s ease; display: flex;
}
.accordion-arrow svg { width: 16px; height: 16px; }
.accordion-arrow.open { transform: rotate(180deg); }
.accordion-header.active .accordion-arrow svg { color: #fff; }
.accordion-body {
  padding: 0 16px 16px; font-size: 13px; line-height: 1.7;
  color: var(--text-secondary);
}

/* ═══════════════ STORAGES TAB ═══════════════ */
.storage-card {
  margin: 0 20px 10px; background: var(--card);
  border: 1px solid var(--border); border-radius: var(--radius-lg);
  overflow: hidden;
}
.storage-header {
  width: 100%; padding: 16px; background: none;
  border: none; cursor: pointer; display: flex;
  justify-content: space-between; align-items: center;
  font-family: inherit; color: var(--text); transition: background 0.15s;
}
.storage-header:active { background: var(--card-hover); }
.storage-name { font-size: 15px; font-weight: 700; text-align: left; }
.storage-loc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; text-align: left; }
.storage-body { padding: 0 16px 16px; }
.storage-body-label {
  font-size: 10px; color: var(--text-dim); text-transform: uppercase;
  letter-spacing: 1px; font-weight: 700; margin: 4px 0 8px;
}
.storage-prop {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.storage-prop:last-of-type { border-bottom: none; }
.storage-prop .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.storage-prop .area { margin-left: auto; font-size: 11px; color: var(--text-dim); }
.storage-nav-link {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  margin-top: 12px; padding: 10px; border-radius: var(--radius-sm);
  background: var(--accent-soft); color: var(--accent);

// ─── HELPERS ─────────────────────────────────────────────────────────────
function extractContact(str) {
  if (!str) return null;
  const s = String(str);
  const match = s.match(/(\+?\d[\d\s-]{8,}\d)/);
  if (match) {
    const num = match[1].replace(/[\s-]/g, '');
    const name = s.replace(match[1], '').replace(/[\n\r]/g, ' ').replace(/^[-:\s]+|[-:\s]+$/g, '').trim();
    return { phone: num, name };
  }
  return { phone: null, name: s.trim() };
}

function linkifyPhones(str) {
  if (!str) return '';
  return String(str).replace(/(\+?\d[\d\s-]{8,}\d)/g, (m) => {
    const num = m.replace(/[\s-]/g, '');
    return `<a href="tel:${num}" style="color:var(--accent);text-decoration:none;font-weight:700">${m}</a>`;
  });
}

function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return 'Καλημέρα';
  if (h < 17) return 'Καλό απόγευμα';
  return 'Καλησπέρα';
}

// ─── GOOGLE SHEETS FETCH ─────────────────────────────────────────────────
function sheetURL(tab) {
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tab)}`;
}

function parseGviz(text) {
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);?/)[1]);
  const cols = json.table.cols.map(c => c.label);
  return json.table.rows.map(r => {
    const obj = {};
    r.c.forEach((cell, i) => {
      if (!cell) obj[cols[i]] = '';
      else if (cell.f !== undefined && cell.f !== null) obj[cols[i]] = cell.f;
      else if (cell.v !== undefined && cell.v !== null) obj[cols[i]] = String(cell.v);
      else obj[cols[i]] = '';
    });
    return obj;
  });
}

async function fetchSheet(tab) {
  const res = await fetch(sheetURL(tab));
  return parseGviz(await res.text());
}

async function loadData() {
  try {
    const [propsRaw, pointsRaw, storagesRaw] = await Promise.all([
      fetchSheet('Properties'), fetchSheet('Points'), fetchSheet('Storages')

    properties = propsRaw.map(r => ({
      id: r.ID, nick: r.Nick_Name, storage: r.Storage, region: r.Region, subregion: r.Subregion,
      lat: parseFloat(r.Latitude), lng: parseFloat(r.Longitude),

      bedrooms: r.Bedrooms, doubleBeds: r.Double_Beds, singleBeds: r.Single_Beds,
      sofaSingle: r.Sofa_Single, sofaDouble: r.Sofa_Double,
      bathrooms: r.Bathrooms, levels: r.Levels, sqm: r.Sqm,
      otherRooms: r.Other_Rooms, otherSpaces: r.Other_Spaces,
      kitchen: r.Kitchen_Amenities, bathroom: r.Bathroom_Amenities, living: r.Living_Room_Amenities,
      checkin: r.Check_in_Time, checkout: r.Check_out_Time,
      wifi: r.Wifi_Network, wifiPass: r.Wifi_Password,
      directions: r.Check_in_Directions, houseInstructions: r.House_Instructions,

// ─── PIN ──────────────────────────────────────────────────────────────────
let pinValue = '';
const pinDots = document.getElementById('pinDots').children;
const pinPad = document.getElementById('pinPad');

[1,2,3,4,5,6,7,8,9,null,0,'⌫'].forEach(n => {
  if (n === null) { pinPad.appendChild(document.createElement('div')); return; }
  const btn = document.createElement('button');
  btn.className = 'pin-btn' + (n === '⌫' ? ' backspace' : '');
  btn.textContent = n === '⌫' ? '←' : n;
  btn.onclick = () => {
    if (n === '⌫') { pinValue = pinValue.slice(0,-1); updateDots(); return; }
    if (pinValue.length >= 4) return;
    pinValue += n;
    updateDots();
    if (pinValue.length === 4) {
      setTimeout(() => {
        if (pinValue === PIN) { unlock(); }
        else {
          document.getElementById('pinDots').classList.add('shake');
          [...pinDots].forEach(d => { d.classList.remove('filled'); d.classList.add('error'); });
          setTimeout(() => {
            document.getElementById('pinDots').classList.remove('shake');
            [...pinDots].forEach(d => d.classList.remove('error'));
            pinValue = ''; updateDots();
          }, 600);
        }
      }, 200);
    }
  };
  pinPad.appendChild(btn);
});

function updateDots() {
  [...pinDots].forEach((d, i) => d.classList.toggle('filled', i < pinValue.length));
}

function unlock() {
  document.getElementById('pinScreen').classList.add('hidden');
  document.getElementById('app').style.display = 'flex';
  sessionStorage.setItem('pm_unlocked', 'true');
  loadData();
  setTimeout(initMap, 100);
}

// ─── SWIPE FOR DETAIL NAV ────────────────────────────────────────────────
const detailViewEl = document.getElementById('detailView');
let touchStartX = 0, touchStartY = 0;

detailViewEl.addEventListener('touchstart', e => {
  touchStartX = e.changedTouches[0].screenX;
  touchStartY = e.changedTouches[0].screenY;
}, { passive: true });

detailViewEl.addEventListener('touchend', e => {
  if (e.target.closest('.contacts-scroll') || e.target.closest('.filters')) return;
  const dx = e.changedTouches[0].screenX - touchStartX;
  const dy = e.changedTouches[0].screenY - touchStartY;
  if (Math.abs(dx) > 70 && Math.abs(dx) > Math.abs(dy)) {
    navigateDetail(dx < 0 ? 1 : -1);
  }
}, { passive: true });

function navigateDetail(dir) {
  if (currentPropIndex === -1 || !currentPropList.length || isAnimating) return;
  isAnimating = true;
  const body = document.getElementById('detailBody');
  const title = document.querySelector('.title-wrapper');
  const outCls = dir === 1 ? 'slide-out-next' : 'slide-out-prev';
  const inCls = dir === 1 ? 'slide-in-next' : 'slide-in-prev';

  body.classList.add(outCls); title.classList.add(outCls);

  setTimeout(() => {
    let ni = currentPropIndex + dir;
    if (ni < 0) ni = currentPropList.length - 1;
    if (ni >= currentPropList.length) ni = 0;
    openDetail(currentPropList[ni].id);
    detailViewEl.scrollTop = 0;
    body.classList.remove(outCls); title.classList.remove(outCls);
    body.classList.add(inCls); title.classList.add(inCls);
    setTimeout(() => {
      body.classList.remove(inCls); title.classList.remove(inCls);
      isAnimating = false;
    }, 200);
  }, 150);
}

// ─── MAP ─────────────────────────────────────────────────────────────────
function initMap() {
  if (map) return;
  map = L.map('global-map', { zoomControl: false, maxZoom: 18 }).setView([38.52, 22.56], 11);
  L.control.zoom({ position: 'topright' }).addTo(map);
  L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', { attribution: '© Google Maps' }).addTo(map);

  markersLayer = L.markerClusterGroup({
    showCoverageOnHover: false, maxClusterRadius: 40,
    iconCreateFunction: cluster => {
      const c = cluster.getChildCount();
      return new L.DivIcon({
        html: `<div><span>${c}</span></div>`,
        className: 'marker-cluster marker-cluster-' + (c < 10 ? 'small' : 'medium'),
        iconSize: new L.Point(40, 40)
      });
    }
  });
  map.addLayer(markersLayer);

  map.on('zoomend', () => {
    document.getElementById('global-map').classList.toggle('hide-map-labels', map.getZoom() < 14);
  });
}

function renderMapMarkers() {
  if (!map) return;
  markersLayer.clearLayers();

  properties.forEach(p => {
    if (!p.lat || !p.lng) return;
    const color = SUBREGION_COLORS[p.subregion] || '#3b82f6';
    const label = p.nick || p.id;
    const icon = L.divIcon({
      className: 'custom-map-marker',
      html: `<div class="marker-bubble" style="background:${color}"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></div><div class="marker-tail"></div>`,
      iconSize: [36, 42], iconAnchor: [18, 42], popupAnchor: [0, -40]
    });
    const mapLink = p.maps || `https://www.google.com/maps/search/?api=1&query=${p.lat},${p.lng}`;
    L.marker([p.lat, p.lng], { icon })
      .bindTooltip(label, { permanent: true, direction: 'top', className: 'pin-label', offset: [0, -45], interactive: true })
      .bindPopup(`<div onclick="openDetail('${p.id}')" style="cursor:pointer"><div class="map-popup-title">${label}</div><div class="map-popup-sub">${SUBREGION_LABELS[p.subregion]||''}</div></div><a class="map-popup-btn" href="${mapLink}" target="_blank" onclick="event.stopPropagation()">Στο χάρτη</a>`)
      .addTo(markersLayer);
  });

  points.forEach(p => {
    if (!p.lat || !p.lng) return;
    const color = CAT_COLORS[p.category] || '#64748b';
    const icon = L.divIcon({
      className: 'custom-map-marker',
      html: `<div class="marker-bubble" style="background:${color}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div><div class="marker-tail"></div>`,
      iconSize: [30, 36], iconAnchor: [15, 36], popupAnchor: [0, -34]
    });
    const mapLink = p.maps || `https://www.google.com/maps/search/?api=1&query=${p.lat},${p.lng}`;
    L.marker([p.lat, p.lng], { icon })
      .bindTooltip(p.name, { permanent: true, direction: 'top', className: 'pin-label', offset: [0, -38], interactive: true })
      .bindPopup(`<div class="map-popup-title">${p.name}</div><div class="map-popup-sub">${p.category}</div><a class="map-popup-btn" href="${mapLink}" target="_blank">Στο χάρτη</a>`)
      .addTo(markersLayer);
  });
}

      <div class="val" style="font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.wifi || '<span style="color:var(--text-dim)">—</span>'}</div>
      <div class="lbl">WiFi</div>
      ${p.wifiPass ? `<button class="copy-btn" onclick="copyText(this,'${p.wifiPass}')" style="margin-top:4px;font-size:10px;max-width:95%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> ${p.wifiPass}</button>` : ''}
    </div>
  </div>`;

  // ── Space Card
  const spaceItems = [
    { ico: ICO.bed, label: 'Υπνοδωμάτια', val: p.bedrooms },
    { ico: ICO.bath, label: 'Μπάνια', val: p.bathrooms },
    { ico: ICO.ruler, label: 'Εμβαδόν', val: p.sqm ? p.sqm + 'm²' : null },
    { ico: ICO.layers, label: 'Επίπεδα', val: p.levels },
    { ico: ICO.bed, label: 'Διπλά κρεβ.', val: p.doubleBeds },
    { ico: ICO.bed, label: 'Μονά κρεβ.', val: p.singleBeds },
    { ico: ICO.sofa, label: 'Καναπ. διπλ.', val: p.sofaDouble },
    { ico: ICO.sofa, label: 'Καναπ. μον.', val: p.sofaSingle },
  ].filter(x => x.val && x.val !== '0');

  if (spaceItems.length) {
    html += `<div class="info-card">
      <div class="info-title">${ICO.home} Χώρος</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
        ${spaceItems.map(s => `<div class="info-row">${s.label} <span>${s.val}</span></div>`).join('')}
      </div>
    </div>`;
  }

  // ── Heating Card (NEW!)
  if (p.heating || p.ac) {
    html += `<div class="info-card">
      <div class="info-title">${ICO.thermometer} Θέρμανση & Κλιματισμός</div>
      ${p.heating ? `<div class="info-row">Πηγή θέρμανσης <span>${p.heating}</span></div>` : ''}
      ${p.ac ? `<div class="info-row">Κλιματισμός (AC) <span style="color:${p.ac === 'Yes' ? 'var(--success)' : 'var(--text-dim)'}">${p.ac === 'Yes' ? 'Ναι' : 'Όχι'}</span></div>` : ''}
    </div>`;
  }

  // ── Contacts
  const contactsList = [
    { key: p.plumber, role: 'Υδραυλικός' },
    { key: p.electrician, role: 'Ηλεκτρολόγος' },
    { key: p.gasSupplier, role: 'Υγραέριο' },
    { key: p.burnerTech, role: 'Καυστήρας' },
    { key: p.oilSupplier, role: 'Πετρέλαιο' },
    { key: p.gasDriver, role: 'Διανομέας' },
  ];
  
  const validContacts = contactsList.filter(c => c.key);
  if (validContacts.length) {
    let cards = '';
    validContacts.forEach(c => {
      const d = extractContact(c.key);
      const name = d.name || c.role;
      cards += `<div class="contact-card">
        <div class="contact-role">${c.role}</div>
        <div class="contact-name">${name}</div>
        ${d.phone
          ? `<a href="tel:${d.phone}" class="contact-call">${ICO.phone} ${d.phone}</a>`
          : `<div class="contact-unavailable">Μη διαθέσιμο</div>`}
      </div>`;
    });
    html += `<div class="contacts-section">
      <div class="contacts-title-row">${ICO.wrench} Επαφές & Τεχνικοί</div>
      <div class="contacts-scroll">${cards}</div>
    </div>`;
  }

  // ── Accordions
  const combinedSpaces = [p.otherRooms, p.otherSpaces].filter(Boolean).join('<br><br>');
  const sections = [
    { icon: ICO.directions, title: 'Οδηγίες Check-in', content: p.directions, color: 'var(--accent)' },
    { icon: ICO.clipboard, title: 'Οδηγίες Σπιτιού', content: p.houseInstructions, color: 'var(--teal)' },
    { icon: ICO.utensils, title: 'Παροχές Κουζίνας', content: p.kitchen, color: 'var(--warning)' },
    { icon: ICO.shower, title: 'Παροχές Μπάνιου', content: p.bathroom, color: 'var(--purple)' },
    { icon: ICO.sofa, title: 'Παροχές Σαλονιού', content: p.living, color: 'var(--orange)' },
    { icon: ICO.door, title: 'Άλλοι Χώροι', content: combinedSpaces, color: 'var(--text-secondary)' },
    { icon: ICO.car, title: 'Parking', content: p.parking, color: 'var(--accent)' },
    { icon: ICO.flame, title: 'Τζάκι', content: p.fireplace, color: 'var(--danger)' },
    { icon: ICO.droplets, title: 'Ζεστό Νερό', content: p.hotWater, color: '#38bdf8' },
  ];

  sections.forEach(s => {
    if (!s.content) return;
    html += `<div class="accordion">
      <button class="accordion-header" onclick="toggleAccordion(this)">
        <span class="acc-icon" style="color:${s.color}">${s.icon}</span>
        <span class="acc-label">${s.title}</span>
        <span class="accordion-arrow">${ICO.chevDown}</span>
      </button>
      <div class="accordion-body" style="display:none">${linkifyPhones(s.content)}</div>
    </div>`;
  });

  html += '<div style="height:80px"></div>';
  document.getElementById('detailBody').innerHTML = html;
  detailViewEl.classList.add('open');
}

function closeDetail() { detailViewEl.classList.remove('open'); }

function toggleAccordion(btn) {
  const body = btn.nextElementSibling;
  const arrow = btn.querySelector('.accordion-arrow');
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  arrow.classList.toggle('open', !isOpen);
  btn.classList.toggle('active', !isOpen);
}

function copyText(btn, text) {
  navigator.clipboard.writeText(text);
  const orig = btn.innerHTML;
  btn.classList.add('copied');
  btn.textContent = '✓ Copied';
  setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = orig; }, 1500);
}

// ─── STORAGES ────────────────────────────────────────────────────────────
function renderStorages() {
  const el = document.getElementById('storageList');
  document.getElementById('storageCount').textContent = `${storages.length} αποθήκες`;
  let html = '';
  storages.forEach((s, idx) => {
    const props = s.propertyIds.map(pid => properties.find(p => p.id === pid)).filter(Boolean);
    html += `<div class="storage-card">
      <button class="storage-header" onclick="toggleStorage(${idx})">
        <div>
          <div class="storage-name">${s.name}</div>
          <div class="storage-loc">${s.location} · ${props.length} σπίτια</div>
        </div>
        <span class="accordion-arrow" id="storArrow${idx}">${ICO.chevDown}</span>
      </button>
      <div class="storage-body" id="storBody${idx}" style="display:none">
        <div class="storage-body-label">Εξυπηρετεί</div>
        ${props.map(p => `<div class="storage-prop" onclick="openDetail('${p.id}')" style="cursor:pointer">
          <div class="dot" style="background:${SUBREGION_COLORS[p.subregion]||'#5e6e82'}"></div>
          <span style="color:var(--text);font-weight:600">${p.nick || p.id}</span>
          <span class="area">${SUBREGION_LABELS[p.subregion]||''}</span>
        </div>`).join('')}
        <a class="storage-nav-link" href="https://www.google.com/maps/search/?api=1&query=${s.lat},${s.lng}" target="_blank" rel="noopener">
          ${ICO.nav} Στο χάρτη
        </a>
      </div>
    </div>`;
  });
  el.innerHTML = html;
}

function toggleStorage(idx) {
  const body = document.getElementById('storBody'+idx);
  const arrow = document.getElementById('storArrow'+idx);
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  arrow.classList.toggle('open', !isOpen);
}

// ─── POINTS ──────────────────────────────────────────────────────────────
function renderPoints() {
  const el = document.getElementById('pointsList');
  const grouped = {};
  points.forEach(p => { (grouped[p.category] = grouped[p.category] || []).push(p); });
  let html = '';
  Object.entries(grouped).forEach(([cat, pts]) => {
    const color = CAT_COLORS[cat] || '#64748b';
    html += `<div class="point-cat-section"><div class="point-cat-title" style="color:${color}">${cat}</div>`;
    pts.forEach(p => {
      const mapLink = p.maps || `https://www.google.com/maps/search/?api=1&query=${p.lat},${p.lng}`;
      html += `<a class="point-card" href="${mapLink}" target="_blank" rel="noopener">
        <span class="name">${p.name}</span>
        <span class="maps-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg> Maps</span>
      </a>`;
    });
    html += '</div>';
  });
  el.innerHTML = html;
}

// ─── INIT ────────────────────────────────────────────────────────────────
switchTab('home');

// Handle home scroll — no longer need dynamic map repositioning since map is embedded
</script>
</body>
